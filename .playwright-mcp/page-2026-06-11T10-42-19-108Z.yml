              - generic [ref=e228]:
                - listitem [ref=e230]:
                  - text: 📦
                  - strong [ref=e231]: Official knowledge base sync tool.
                  - text: A new companion tool from Open WebUI, oikb, keeps a knowledge base in sync with a local directory, GitHub repo, S3 bucket, Confluence space, or any of more than 40 other sources, uploading only new and changed files using the incremental sync support added in this release.
                  - link "oikb" [ref=e232] [cursor=pointer]:
                    - /url: https://github.com/open-webui/oikb
                - listitem [ref=e234]:
                  - text: 📂
                  - strong [ref=e235]: Smart directory sync for knowledge bases.
                  - text: "Local directories can now be synced into a knowledge base in one action: file checksums are compared against what's already stored, and only added or modified files are uploaded while removed files and orphaned subdirectories are cleaned up, with the directory structure mirrored automatically and per-file progress shown throughout."
                  - link "#19190" [ref=e236] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/19190
                  - text: ","
                  - link "#19394" [ref=e237] [cursor=pointer]:
