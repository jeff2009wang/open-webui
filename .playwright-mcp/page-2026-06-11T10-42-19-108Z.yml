                  - text: ","
                  - link "Commit" [ref=e551] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/f16b5c446027eae1bd767617bac2fdf54b24d6fc
                - listitem [ref=e553]:
                  - text: 🖼️
                  - strong [ref=e554]: ComfyUI image generation and editing.
                  - text: Generating and editing images via a ComfyUI backend now works again, including when ComfyUI is hosted on a private or internal network where URL validation was previously blocking the admin-configured endpoint.
                  - link "#24565" [ref=e555] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/24565
                  - text: ","
                  - link "Commit" [ref=e556] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/7dcd932ad7cb5feab007737c6e0281def5cd47fc
                  - text: ","
                  - link "Commit" [ref=e557] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/8aa2a42dc7887512e697ff85d044220945ced40f
                - listitem [ref=e559]:
                  - text: 🖌️
                  - strong [ref=e560]: Image generation with non-standard response headers.
                  - text: Image generation now works with backends that return valid JSON without a standard content-type header, instead of rejecting the response.
                  - link "#24838" [ref=e561] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24838
                - listitem [ref=e563]:
                  - text: 🐘
                  - strong [ref=e564]: Knowledge search on large documents.
                  - text: Searching knowledge bases on PostgreSQL no longer fails when scanning across documents with very large extracted text content.
                  - link "#24670" [ref=e565] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/24670
                  - text: ","
                  - link "Commit" [ref=e566] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/d74ee34d9128295faa116c919bd1dcca77744975
                - listitem [ref=e568]:
                  - text: 💬
                  - strong [ref=e569]: Chat title generation.
                  - text: Automatically generated chat titles now use the model currently selected in the dropdown for the active chat and fall back to the model from the active message branch otherwise, and a clear message is shown if no model is available instead of an unhelpful error.
                  - link "#24604" [ref=e570] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/24604
                  - text: ","
                  - link "#24745" [ref=e571] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/24745
                  - text: ","
                  - link "Commit" [ref=e572] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/e5c8f8110a88739e011d8ab23e5cb11b4768469f
                  - text: ","
                  - link "Commit" [ref=e573] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/3c5e7968f0b5130890e17f1f2a2a52297cb145a6
                - listitem [ref=e575]:
                  - text: 🧮
                  - strong [ref=e576]: Message search and analytics consistency.
                  - text: Edits, deletions, and branch changes made in a chat are now reflected in message search results and analytics counts instead of leaving stale entries behind.
                  - link "#25205" [ref=e577] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25205
                  - text: ","
                  - link "Commit" [ref=e578] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/aa06200f789a4c3fc54ea9a141cd347d76cda4c5
                - listitem [ref=e580]:
                  - text: 🩹
                  - strong [ref=e581]: Graceful handling of in-chat task failures.
                  - text: When web search query generation, image prompt generation, or a tool call fails or references a missing tool, the chat now falls back or surfaces a clear error instead of breaking partway through the response.
                  - link "#25038" [ref=e582] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/25038
                  - text: ","
                  - link "#25144" [ref=e583] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/25144
                  - text: ","
                  - link "Commit" [ref=e584] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/b64fd988f02b8a4295193892b24b00bdf635a4dc
                - listitem [ref=e586]:
                  - text: 🎛️
                  - strong [ref=e587]: Filter changes to message output.
                  - text: Filter functions that modify a message's structured output after generation now have those changes saved and displayed, instead of being discarded when only the output, not the text content, was changed.
                  - link "#24884" [ref=e588] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24884
                - listitem [ref=e590]:
                  - text: ⏩
                  - strong [ref=e591]: Titles and tags reflect filtered output.
                  - text: Outlet filters now run before automatic title, tag, and follow-up generation, so those are based on the final filtered message instead of the unfiltered version.
                  - link "#24717" [ref=e592] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24717
                - listitem [ref=e594]:
                  - text: 💾
                  - strong [ref=e595]: Action-replaced message content persists.
                  - text: Message content replaced by an action function through its event emitter is now kept when the chat is saved, instead of reverting to the original after a page reload.
