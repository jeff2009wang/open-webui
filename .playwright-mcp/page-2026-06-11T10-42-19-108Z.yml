                  - text: ","
                  - link "Commit" [ref=e243] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/1527eb6e01d441225c979d12d78b7625edf1086f
                - listitem [ref=e245]:
                  - text: 🗂️
                  - strong [ref=e246]: Knowledge base folders.
                  - text: Files inside a knowledge base can now be organized into nested folders, with breadcrumb navigation that makes it much easier to manage and find content in large collections.
                  - link "Commit" [ref=e247] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/c2cbc47ca76ebfa21e1d36279dbd859283cbbfb1
                  - text: ","
                  - link "Commit" [ref=e248] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/ab0ee858b73738c5b77d1d455e66e66bc61df1c4
                  - text: ","
                  - link "Commit" [ref=e249] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/2ad327a4dce64a8eedf5eb41c73b8520344fdd82
                  - text: ","
                  - link "Commit" [ref=e250] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/171150c1e12b5713f77a5ea0dd19c6581c7bef2e
                  - text: ","
                  - link "Commit" [ref=e251] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/e7d2ddbb1d14c03a52797751d24a98132aac0cd8
                  - text: ","
                  - link "Commit" [ref=e252] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/32a417bbf66ed28a5ca8a759ad3a87b2a2aa358a
                - listitem [ref=e254]:
                  - text: 🧰
                  - strong [ref=e255]: Filesystem tool for knowledge bases.
                  - text: A new built-in tool, enabled via the "ENABLE_KB_EXEC" environment variable, lets AI models browse and search knowledge base contents using familiar filesystem commands such as 'ls', 'cat', 'grep', 'find', 'head', 'tail', and 'sed', including pipes between them.
                  - link "Commit" [ref=e256] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/5b125c24d4eae925d3287efa626595bab29d5c33
                  - text: ","
                  - link "Commit" [ref=e257] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/ecec86dd32aa396dd5a383e9be5b0f16c4346c48
                  - text: ","
                  - link "Commit" [ref=e258] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/9ef579ce4be5b82f9281b085a621fed5b04e0d26
                  - text: ","
                  - link "Commit" [ref=e259] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/2f642754ac6b8c430228a7fc289357a6c6652235
                  - text: ","
                  - link "Commit" [ref=e260] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/3b00e5721a60518ea317c4fd61a6d0d182961a2f
                  - text: ","
                  - link "Commit" [ref=e261] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/4e78b355efe0611f27fddef591c69f7c1259a9f6
                  - text: ","
                  - link "Commit" [ref=e262] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/74f95a9b0d6b89b241701422170d54e21e701baa
                  - text: ","
                  - link "Commit" [ref=e263] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/cc16e06c32de48bdf464db5814483a49f3527b63
                  - text: ","
                  - link "Commit" [ref=e264] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/1ea54c3217f487990b6a4c0f0d8ea675a479b6e1
                - listitem [ref=e266]:
                  - text: ✏️
                  - strong [ref=e267]: File renaming in knowledge bases.
                  - text: Files inside a knowledge base can now be renamed directly from the workspace, with the new name reflected wherever the file is referenced.
                  - link "Commit" [ref=e268] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/3127f1b46255626ea92eb0b598e45078287303f1
                - listitem [ref=e270]:
                  - text: 😀
                  - strong [ref=e271]: Emoji picker in message input.
                  - text: A new emoji button in the rich text formatting toolbar lets you browse and insert emojis directly into your messages.
                  - link "#24704" [ref=e272] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24704
                - listitem [ref=e274]:
                  - text: 🪄
                  - strong [ref=e275]: Per-chat skills toggle.
                  - text: Skills can now be turned on or off for a conversation directly from the chat Integrations menu, the same way tools and capabilities already work, instead of only through the model preset.
                  - link "#25036" [ref=e276] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/25036
                  - text: ","
                  - link "#25037" [ref=e277] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25037
                - listitem [ref=e279]:
                  - text: 🔎
                  - strong [ref=e280]: Access preview for users and groups.
                  - text: Administrators can now preview exactly which models, knowledge bases, and tools a given user or group can access, making it easier to audit and verify permission setups.
                  - link "Commit" [ref=e281] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/9c14740ffb009d550dcbd5d6c599dac57053f112
                - listitem [ref=e283]:
                  - text: 📄
                  - strong [ref=e284]: Configurable knowledge base file page size.
                  - text: Administrators can now request a larger page size when listing a knowledge base's files through the API, reducing the number of requests needed to retrieve large collections instead of paging through fixed increments of 30.
                  - link "#25148" [ref=e285] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/25148
                  - text: ","
                  - link "Commit" [ref=e286] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/a4d1b3e9378a61a11dd9822a8dbb525f39753081
                - listitem [ref=e288]:
                  - text: 🔃
                  - strong [ref=e289]: Persistent processing indicator for knowledge files.
                  - text: Files still being processed in a knowledge base now keep showing a processing indicator across page reloads, so you can tell what's still ingesting after navigating away and back.
                  - link "#25031" [ref=e290] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/25031
                  - text: ","
                  - link "Commit" [ref=e291] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/ad9f2eeb15a448147d5e47e6a391cabb9aefd0ea
                - listitem [ref=e293]:
                  - text: 📑
                  - strong [ref=e294]: MinerU file type configuration.
                  - text: Administrators can now configure which file types are processed by the MinerU document loader, via the new "MINERU_FILE_EXTENSIONS" setting, extending it beyond PDF to formats like DOCX, PPTX, and XLSX.
                  - link "Commit" [ref=e295] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/d4030a8aa5d48c2a1cb06c461566844aca2530ab
                - listitem [ref=e297]:
                  - text: 📃
                  - strong [ref=e298]: Legacy Word document support.
                  - text: Older ".doc" Word files can now have their text extracted by the default document extraction engine, in addition to the modern ".docx" format.
                  - link "Commit" [ref=e299] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/9e3e24e304f8ff210494380b46f614a2984cafb3
                - listitem [ref=e301]:
                  - text: 📁
                  - strong [ref=e302]: Create subfolders from the folder header.
                  - text: Chat folders can now have subfolders created directly from the folder header in the chat view, not just from the sidebar.
                  - link "Commit" [ref=e303] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/1f0948bcbef2af73b155535ea27762c522260afc
                - listitem [ref=e305]:
                  - text: ⚡
                  - strong [ref=e306]: Faster initial page loads.
                  - text: The configuration endpoint that loads on every page visit no longer runs an unnecessary user-count query, making the initial application load lighter on the database, especially on instances with many users.
                  - link "Commit" [ref=e307] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/0adc090dcbe636c9c9645d8ec7f6b89ea514870b
                - listitem [ref=e309]:
                  - text: 🚀
                  - strong [ref=e310]: Faster tool-enabled chat completions.
                  - text: Chat completions that use multiple tools now start faster because the tools they reference are fetched from the database in a single batch query instead of one query per tool.
                  - link "#24808" [ref=e311] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24808
                  - text: ","
                  - link "Commit" [ref=e312] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/cc94a90b4d4d690bc7cb9f7124f2d6e552973970
                - listitem [ref=e314]:
                  - text: 🏎️
                  - strong [ref=e315]: More responsive web search under load.
                  - text: Web search through SearXNG, Google PSE, Brave, Serper, and Serpstack now uses non-blocking network calls, so the server stays responsive to other users while a search is in flight, and concurrent multi-query searches complete faster.
                  - link "Commit" [ref=e316] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/b94245d2ee191e8ef118bf9de1ff7539503bfec9
                - listitem [ref=e318]:
                  - text: 🐎
                  - strong [ref=e319]: Lighter Ollama backend connections.
                  - text: Requests to Ollama backends now reuse a shared connection pool instead of opening a fresh session each time, reducing TCP and TLS handshake overhead for installs that poll Ollama frequently or have multiple backends configured.
                  - link "Commit" [ref=e320] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/5d9a09a88a9094ebfcd249340be3aaee544b34d0
                - listitem [ref=e322]:
                  - text: 💽
                  - strong [ref=e323]: Fewer redundant model-list writes.
                  - text: On multi-instance deployments backed by Redis, the model list is no longer rewritten when it hasn't changed, cutting a major source of redundant writes.
                  - link "#25469" [ref=e324] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/25469
                  - text: ","
                  - link "#25474" [ref=e325] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25474
                  - text: ","
                  - link "Commit" [ref=e326] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/fd76b51ab2ad4c4192f2c98153e47888712c2009
                - listitem [ref=e328]:
                  - text: 📉
                  - strong [ref=e329]: Faster websocket disconnect cleanup.
                  - text: Disconnecting from a collaborative session no longer triggers a scan across the entire Redis keyspace, using a per-session index instead, which keeps disconnects cheap on large deployments.
                  - link "#25466" [ref=e330] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/25466
                  - text: ","
                  - link "Commit" [ref=e331] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/c7de057a4a54cc80f366ad949417e78fae756d4c
                - listitem [ref=e333]:
                  - text: 📝
                  - strong [ref=e334]: Frontmatter auto-fill for tools, functions, and skills.
                  - text: Opening a tool, function, or skill editor now auto-fills the name, id, and description fields from the file's frontmatter, saving you from re-entering metadata already declared in the source.
                  - link "#24649" [ref=e335] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24649
                  - text: ","
                  - link "Commit" [ref=e336] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/ef975649b26d3e7cd589c49be2fc77cee80fad8f
                - listitem [ref=e338]:
                  - text: 🪪
                  - strong [ref=e339]: More user placeholders in custom headers.
                  - text: "Custom-header templates for direct connections and tool servers now support \"{{USER_EMAIL}}\" and \"{{USER_ROLE}}\" alongside the existing user and session placeholders."
                  - link "Commit" [ref=e340] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/ed73ef3d8df988b0e9646b82df5b1a453202ef8d
                - listitem [ref=e342]:
                  - text: ⏱️
                  - strong [ref=e343]: Configurable MCP connection timeout.
                  - text: The timeout for the initial handshake with an MCP tool server is now configurable via the new "MCP_INITIALIZE_TIMEOUT" setting, so servers that are slow to start or expose many tools can finish connecting instead of timing out.
                  - link "#25011" [ref=e344] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25011
                  - text: ","
                  - link "Commit" [ref=e345] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/4297c02b121180e239a61c483ac8477cc557d4ef
                - listitem [ref=e347]:
                  - text: 📐
                  - strong [ref=e348]: Profile image size limit.
                  - text: Administrators can now cap the size of inline profile images via the new "PROFILE_IMAGE_MAX_DATA_URI_SIZE" setting, bounding how much database and cache space inline avatars and model icons can consume.
                  - link "#25468" [ref=e349] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/25468
                  - text: ","
                  - link "#25476" [ref=e350] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25476
                - listitem [ref=e352]:
                  - text: 🎫
                  - strong [ref=e353]: Wildcard OAuth role mapping.
                  - text: Administrators can now set "*" in the allowed OAuth roles to grant the user role to any authenticated OAuth user, instead of having to enumerate every accepted role.
                  - link "#25062" [ref=e354] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25062
                  - text: ","
                  - link "Commit" [ref=e355] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/07cbc91a8eba3a9a3b39588b2ae5de916930af70
                - listitem [ref=e357]:
                  - text: 📊
                  - strong [ref=e358]: Paginated feedback history.
                  - text: The feedback and evaluation history list is now paginated, keeping it responsive for instances that have accumulated large numbers of feedback entries.
                  - link "Commit" [ref=e359] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/160a6694e4bd66fc42e6361947516e8e15414ef3
                - listitem [ref=e361]:
                  - text: 🔘
                  - strong [ref=e362]: Bulk enable or disable automations.
                  - text: Automations can now be enabled or disabled in bulk from an actions menu on the automations page, instead of toggling each one individually.
                  - link "Commit" [ref=e363] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/675e9bee5af8b9fb390fcb235a6c2c4766e78c75
                - listitem [ref=e365]:
                  - text: ➡️
                  - strong [ref=e366]: Optional auto-redirect to single sign-on.
                  - text: Administrators can now enable "OAUTH_AUTO_REDIRECT" so that, on deployments with a single sign-on provider and no other login methods, users are sent straight to the provider instead of seeing a login page first.
                  - link "#25067" [ref=e367] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25067
                  - text: ","
                  - link "Commit" [ref=e368] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/d64ef1803d2f5cedb7b3a308151d08ff2cd2b8e1
                - listitem [ref=e370]:
                  - text: ☁️
                  - strong [ref=e371]: Azure AI Foundry v1 with Entra ID.
                  - text: Open WebUI now supports Azure AI Foundry's OpenAI v1 endpoint together with Microsoft Entra ID authentication, so these connections work without manual workarounds.
                  - link "#24761" [ref=e372] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/24761
                  - text: ","
                  - link "#24985" [ref=e373] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24985
                  - text: ","
                  - link "Commit" [ref=e374] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/eb4eebc3ce1042cb0d393bf890c1895db6e08b19
                - listitem [ref=e376]:
                  - text: 🌎
                  - strong [ref=e377]: Linkup web search provider.
                  - text: Administrators can now select Linkup as the web search provider from the admin settings, with options to configure the API key and search depth.
                  - link "#24752" [ref=e378] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24752
                  - text: ","
                  - link "Commit" [ref=e379] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/56c0d00e13c74d665124ec9f1cae78e83ca60b6a
                - listitem [ref=e381]:
                  - text: 🧊
                  - strong [ref=e382]: Valkey vector database support.
                  - text: Valkey can now be used as the vector database backend, configurable through new "VALKEY_URL" and related settings including index type, distance metric, and HNSW tuning.
                  - link "#24769" [ref=e383] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24769
                  - text: ","
                  - link "Commit" [ref=e384] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/c0f1aa291938bbef62db8d4013dbc498b0abea15
                - listitem [ref=e386]:
                  - text: 🔄
                  - strong [ref=e387]: General improvements.
                  - text: Various improvements were implemented across the application to enhance performance, stability, and security.
                - listitem [ref=e389]:
                  - text: 🌐
                  - strong [ref=e390]: Translation updates.
                  - text: Translations for Spanish (Spain), Swedish, German, Korean, Catalan, Russian, Irish, Simplified Chinese, Traditional Chinese, Finnish, Polish, Turkish, and Malay were enhanced and expanded.
            - generic [ref=e391]:
              - generic [ref=e392]: fixed
              - generic [ref=e393]:
                - listitem [ref=e395]:
                  - text: 🛡️
                  - strong [ref=e396]: Security Advisory
                  - text: ": This release includes security and access-control fixes. We recommend updating production deployments at your earliest convenience. Not all security fixes in this version may be enumerated in the fixed section — some may be withheld for a short time to give administrators time to upgrade."
                  - link "Advisories" [ref=e397] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/security
                - listitem [ref=e399]:
                  - text: 🛡️
                  - strong [ref=e400]: Tool server permission enforcement.
                  - text: The per-user permission for inline tool servers is now enforced on chat-completion requests, so users without that permission can no longer bypass the admin setting by supplying tool servers directly in their requests.
                  - link "Commit" [ref=e401] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/5cc1eb517094e3507915664817285f1e6e37a16d
                - listitem [ref=e403]:
                  - text: 🔒
                  - strong [ref=e404]: Knowledge base access check in search tool.
                  - text: The built-in knowledge search tool now verifies that the caller can access a knowledge base before searching it by id, preventing users from reading the contents of knowledge bases they have not been granted access to.
                  - link "#25113" [ref=e405] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25113
                - listitem [ref=e407]:
                  - text: 🗄️
                  - strong [ref=e408]: Cross-user access to retrieval collections.
                  - text: Resolving the documents used for retrieval now verifies the caller's access to each referenced file and rejects client-supplied collection names, preventing a crafted request from pulling another user's files or vector collections into its context.
                  - link "Commit" [ref=e409] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/ee47c9c833f8889f3abe99d2266c56e8f8d40230
                - listitem [ref=e411]:
                  - text: 🔣
                  - strong [ref=e412]: Collection name validation.
                  - text: Vector collection names are now rejected unless they contain only safe characters, preventing malformed names from reaching the vector store or breaking out of a database query expression.
                  - link "#24982" [ref=e413] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24982
                - listitem [ref=e415]:
                  - text: 🚫
                  - strong [ref=e416]: Unscoped retrieval collections denied by default.
                  - text: Retrieval requests for collection names that don't correspond to a known file, memory, web-search, or knowledge base are now denied for non-admins by default, with a new "ENABLE_RETRIEVAL_UNSCOPED_COLLECTIONS" setting to restore the previous behavior if needed.
                  - link "Commit" [ref=e417] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/c93f071700520a60833b7f9616c292b11f210880
                - listitem [ref=e419]:
                  - text: 📜
                  - strong [ref=e420]: Prompt history authorization.
                  - text: Comparing, deleting, and restoring prompt versions now verify the history entry belongs to the prompt you're authorized for, preventing access to or modification of another prompt's version history.
                  - link "#25056" [ref=e421] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25056
                - listitem [ref=e423]:
                  - text: 🚦
                  - strong [ref=e424]: Code interpreter permission on the legacy path.
                  - text: The legacy code-execution path now enforces the same permission and capability checks as the current one, so users without the code interpreter permission can no longer trigger code execution through it.
                  - link "#24724" [ref=e425] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24724
                - listitem [ref=e427]:
                  - text: 🧱
                  - strong [ref=e428]: API key endpoint restriction bypass.
                  - text: The endpoint allow-list that limits which paths an API key may reach is now matched against the routed request path directly, preventing a crafted request from slipping past the restriction.
                  - link "#25123" [ref=e429] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25123
                - listitem [ref=e431]:
                  - text: 🚧
                  - strong [ref=e432]: System prompt bypass via request parameter.
                  - text: The flag that skips a model's configured system prompt can no longer be set by external clients through a request parameter, so admin-configured system prompts can't be bypassed from the API.
                  - link "#25156" [ref=e433] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25156
                - listitem [ref=e435]:
                  - text: 🚪
                  - strong [ref=e436]: Terminal proxy path traversal.
                  - text: The terminal proxy now fully decodes request paths before validating them, blocking multi-encoded payloads that could otherwise escape the intended path.
                  - link "#25157" [ref=e437] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25157
                - listitem [ref=e439]:
                  - text: 🪤
                  - strong [ref=e440]: Cache file path traversal.
                  - text: The cache file server now requires an exact directory boundary match, closing a gap where a sibling directory whose name began with the cache directory's name could be used to serve files from outside it.
                  - link "#25086" [ref=e441] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25086
                - listitem [ref=e443]:
                  - text: 🔀
                  - strong [ref=e444]: Ollama backend selection access check.
                  - text: Requests can no longer target an arbitrary Ollama backend by index; a caller-supplied backend selector is now verified against the backends that actually serve the requested model.
                  - link "Commit" [ref=e445] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/7139797be04030b9d1016782f1dbb251c5fe68bb
                - listitem [ref=e447]:
                  - text: 🔓
                  - strong [ref=e448]: Cross-user file exfiltration via image URLs.
                  - text: When a chat message references a file by id in an "image_url" field, the server now resolves that file only for its owner, an administrator, or a user with an explicit read grant, preventing other authenticated users from extracting a file's contents by routing it through the model.
                  - link "#24625" [ref=e449] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24625
                  - text: ","
                  - link "Commit" [ref=e450] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/c75fe8e74b72617c51282cc3ea0a2e8d9cdd9140
                - listitem [ref=e452]:
                  - text: 📌
                  - strong [ref=e453]: Chat file attachment access checks.
                  - text: Attaching files to a chat now links only files the caller can read, preventing a user from associating another user's file with their chat to access its contents.
                  - link "#25054" [ref=e454] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25054
                - listitem [ref=e456]:
                  - text: 🧾
                  - strong [ref=e457]: Model knowledge file ownership checks.
                  - text: Creating or updating a model now verifies that any knowledge files attached to it are files the editor can access, preventing another user's files from being attached to a model.
                  - link "#25055" [ref=e458] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25055
                  - text: ","
                  - link "Commit" [ref=e459] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/27fb20c13a4bf8501f7a485abe0654eb5880980d
                - listitem [ref=e461]:
                  - text: 📅
                  - strong [ref=e462]: Calendar event move authorization.
                  - text: Updating a calendar event to move it into a different calendar now requires write access on the destination calendar, preventing users from injecting events into calendars they cannot write to.
                  - link "#24764" [ref=e463] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24764
                - listitem [ref=e465]:
                  - text: 📣
                  - strong [ref=e466]: Channel chat access control.
                  - text: Generating a response in a channel context now verifies the caller's access to that channel and scopes the included messages, preventing access to channels or messages the user isn't permitted to see.
                  - link "#24725" [ref=e467] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24725
                - listitem [ref=e469]:
                  - text: 🕸️
                  - strong [ref=e470]: Web loader SSRF gating with Playwright.
                  - text: When the Playwright-based web loader is in use, page navigations and redirects are now validated the same way as the default loader, closing a gap where the Playwright path could reach internal or otherwise blocked URLs.
                  - link "#24756" [ref=e471] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24756
                - listitem [ref=e473]:
                  - text: 🛂
                  - strong [ref=e474]: DNS rebinding protection for URL fetches.
                  - text: The IP address validated for an outbound URL fetch is now the same one used for the actual connection, closing a DNS rebinding window where an attacker-controlled hostname could resolve to a public IP during the safety check and then to a private IP when the connection was opened.
                  - link "#24759" [ref=e475] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24759
                - listitem [ref=e477]:
                  - text: 🪞
                  - strong [ref=e478]: OAuth profile picture redirect handling.
                  - text: The OAuth profile picture fetch now follows redirects only when administrators have explicitly allowed it, closing a window where a redirect from an externally validated URL could be used to reach internal addresses.
                  - link "#24809" [ref=e479] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24809
                - listitem [ref=e481]:
                  - text: 🧼
                  - strong [ref=e482]: Model profile image script injection.
                  - text: Model profile images are now validated on save and only served inline when they are a known-safe image type, preventing a crafted SVG profile image from running scripts in other users' browsers, while existing legacy images that fail validation are cleared gracefully instead of breaking the model list.
                  - link "#25060" [ref=e483] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25060
                  - text: ","
                  - link "#25173" [ref=e484] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25173
                - listitem [ref=e486]:
                  - text: 🧯
                  - strong [ref=e487]: Diagram rendering script injection.
                  - text: Mermaid diagrams rendered in chat are now sanitized before display, preventing a crafted diagram from running scripts in the viewer's browser.
                  - link "#25219" [ref=e488] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25219
                - listitem [ref=e490]:
                  - text: 🔐
                  - strong [ref=e491]: Shared-chat file write protection.
                  - text: Access to a file through a shared chat now only grants read access, so users who can read a shared chat can no longer modify or delete files attached to it.
                  - link "#24755" [ref=e492] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24755
                - listitem [ref=e494]:
                  - text: 🔏
                  - strong [ref=e495]: Cross-origin embed prompt control.
                  - text: When Open WebUI is embedded in an iframe on a different origin, the embedding page can now only drive the chat input or submit prompts if the user has explicitly opted in via the "iframe Sandbox Allow Same Origin" setting, preventing untrusted host pages from triggering confirmation dialogs or controlling the chat.
                  - link "#24767" [ref=e496] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24767
                  - text: ","
                  - link "Commit" [ref=e497] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/eb3076c1b02d90c2ce6e6d3beb08a37987c740ec
                - listitem [ref=e499]:
                  - text: 🗂️
                  - strong [ref=e500]: Chat folder ownership checks.
                  - text: Creating a chat or updating a chat's folder now verifies the referenced folder belongs to the current user, preventing chats from being associated with folders owned by other people.
                  - link "#24588" [ref=e501] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24588
                - listitem [ref=e503]:
                  - text: 🧩
                  - strong [ref=e504]: Chat recovery from corrupted history.
                  - text: Chats whose internal message graph was left in a malformed state by a failed regeneration now open and load correctly, with missing roles, parent references, and current-message pointers reconstructed automatically instead of breaking the chat.
                  - link "#24424" [ref=e505] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/24424
                  - text: ","
                  - link "#24157" [ref=e506] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/24157
                  - text: ","
                  - link "#20474" [ref=e507] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/20474
                  - text: ","
                  - link "#24799" [ref=e508] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24799
                  - text: ","
                  - link "Commit" [ref=e509] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/d310a0777c4c48ec772bdc9a510005d5e91b09c7
                - listitem [ref=e511]:
                  - text: 📨
                  - strong [ref=e512]: Imported chats with folders appear correctly.
                  - text: Importing grouped chats no longer leaves them invisible when a referenced folder is missing; such chats now appear in the chat list instead of being silently orphaned.
                  - link "#24910" [ref=e513] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/24910
                  - text: ","
                  - link "Commit" [ref=e514] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/7f7cd210186cb6a67e028c17974eb210fc7ba9fd
                - listitem [ref=e516]:
                  - text: 🎟️
                  - strong [ref=e517]: MCP tool server sessions stay connected.
                  - text: OAuth-authenticated MCP tool server sessions are no longer mistakenly refreshed and deleted by the single sign-on session handler, so those connections stay active.
                  - link "#24618" [ref=e518] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/24618
                  - text: ","
                  - link "Commit" [ref=e519] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/c8eb8edca4174ec68fabd071d6b08c0bc07f8117
                - listitem [ref=e521]:
                  - text: 🤝
                  - strong [ref=e522]: MCP OAuth scope discovery.
                  - text: The OAuth flow for MCP tool servers now reads the scopes a server advertises through its Protected Resource Metadata, so connecting to servers that declare their own scopes succeeds.
                  - link "#24730" [ref=e523] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/24730
                  - text: ","
                  - link "#24690" [ref=e524] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24690
                - listitem [ref=e526]:
                  - text: 🔍
                  - strong [ref=e527]: Web search reliability.
                  - text: Web search again fetches page content reliably with the default web loader engine, a new "USER_AGENT" environment variable lets administrators set a real browser user-agent so fetches aren't blocked by Cloudflare, Wikipedia, and other bot-detection systems, and the startup script no longer fails to launch when these new environment variables are unset.
                  - link "#24560" [ref=e528] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/24560
                  - text: ","
                  - link "#24793" [ref=e529] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/24793
                  - text: ","
                  - link "#24683" [ref=e530] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24683
                  - text: ","
                  - link "Commit" [ref=e531] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/f60733758272c4532cd032e518c9cd73f648043a
                - listitem [ref=e533]:
                  - text: 🔥
                  - strong [ref=e534]: Firecrawl web search results.
                  - text: Web search using Firecrawl now returns results correctly regardless of which response format the Firecrawl version uses.
                  - link "#24712" [ref=e535] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/24712
                - listitem [ref=e537]:
                  - text: 🦅
                  - strong [ref=e538]: Kagi web search.
                  - text: Web search using Kagi works again after its API endpoint and request method were updated to match Kagi's current API.
                  - link "#25015" [ref=e539] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/pull/25015
                - listitem [ref=e541]:
                  - text: 🔢
                  - strong [ref=e542]: Bracketed numbers in code blocks.
                  - text: Numbers in square brackets such as "[0]" inside code blocks are no longer stripped out as if they were source citations, so code displays and copies correctly.
                  - link "#24948" [ref=e543] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/24948
                  - text: ","
                  - link "Commit" [ref=e544] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/commit/e90a618f4555cea2c024bb60c1332ca04eed96da
                - listitem [ref=e546]:
                  - text: 🔌
                  - strong [ref=e547]: API chat completions reliability.
                  - text: Direct calls to the chat completions API no longer fail with an internal error when no chat session identifier is supplied.
                  - link "#24553" [ref=e548] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/24553
                  - text: ","
                  - link "#25235" [ref=e549] [cursor=pointer]:
                    - /url: https://github.com/open-webui/open-webui/issues/25235
                  - text: ","
                  - link "Commit" [ref=e550] [cursor=pointer]:
